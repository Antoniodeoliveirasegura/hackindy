<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Services · Purdue Indy Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg0:#ffffff;--bg1:#f2f1ee;--bg2:#e8e7e3;
--txt0:#111110;--txt1:#52514d;--txt2:#8a897f;
--bdr:rgba(0,0,0,0.09);--bdr2:rgba(0,0,0,0.16);
--gold:#CFB991;--gold-dk:#3E2200;--stat:#eceae6;
}
.dark{
--bg0:#111113;--bg1:#18181a;--bg2:#222224;
--txt0:#f2f1ee;--txt1:#9a9890;--txt2:#5c5b55;
--bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.14);
--gold:#CFB991;--gold-dk:#4a2c00;--stat:#1e1e20;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg1);color:var(--txt0);}
.navbar{background:var(--bg0);border-bottom:0.5px solid var(--bdr);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.nav-logo{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--txt0);}
.logo-badge{background:var(--gold);color:var(--gold-dk);font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;}
.nav-links{display:flex;gap:2px;}
.nb{font-size:13px;color:var(--txt1);padding:5px 12px;border-radius:6px;cursor:pointer;border:none;background:none;font-family:inherit;}
.nb:hover,.nb.active{background:var(--bg2);color:var(--txt0);}.nb.active{font-weight:500;}
.nav-r{display:flex;align-items:center;gap:8px;}
.tbtn{width:32px;height:32px;border-radius:7px;border:0.5px solid var(--bdr2);background:var(--bg2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--txt0);}
.av{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold-dk);}
.main{max-width:1000px;margin:0 auto;padding:1.5rem 2rem 5rem;}
.page-hdr{margin-bottom:1.5rem;}
.page-hdr h1{font-size:22px;font-weight:500;}
.page-hdr p{font-size:13px;color:var(--txt1);margin-top:3px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg0);border:0.5px solid var(--bdr2);border-radius:9px;padding:9px 14px;margin-bottom:1.5rem;}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--txt0);outline:none;flex:1;font-family:inherit;}
.search-box input::placeholder{color:var(--txt2);}
.sicon{color:var(--txt2);}
.section{margin-bottom:1.75rem;}
.section-title{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.svc-card{background:var(--bg0);border:0.5px solid var(--bdr);border-radius:11px;padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:border-color .15s;}
.svc-card:hover{border-color:var(--bdr2);}
.svc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.svc-body{flex:1;min-width:0;}
.svc-name{font-size:13px;font-weight:500;color:var(--txt0);margin-bottom:2px;}
.svc-desc{font-size:11px;color:var(--txt2);line-height:1.4;}
.svc-link{font-size:10px;color:#2062a4;margin-top:4px;display:block;}
.dark .svc-link{color:#93c2f0;}
.icon-blue{background:#ddeaf8;}.dark .icon-blue{background:#0a2d52;}
.icon-green{background:#dff0e0;}.dark .icon-green{background:#0f3018;}
.icon-amber{background:#faebd4;}.dark .icon-amber{background:#2e1800;}
.icon-purple{background:#eeedfe;}.dark .icon-purple{background:#1e1a40;}
.icon-pink{background:#f8e0ec;}.dark .icon-pink{background:#320c20;}
.icon-gray{background:var(--stat);}
.quick-links{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.75rem;}
.ql-card{background:var(--bg0);border:0.5px solid var(--bdr);border-radius:10px;padding:.9rem 1rem;text-align:center;cursor:pointer;transition:border-color .15s;}
.ql-card:hover{border-color:var(--bdr2);}
.ql-icon{font-size:22px;margin-bottom:6px;}
.ql-label{font-size:12px;font-weight:500;color:var(--txt0);}
/* Campus Assistant — fixed */
.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.fab{width:46px;height:46px;border-radius:50%;background:var(--gold-dk);color:var(--gold);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.18);transition:background .15s;}
.fab:hover{background:#5c3a00;}.dark .fab:hover{background:#6a4400;}
.ai-panel{background:var(--bg0);border:0.5px solid var(--bdr2);border-radius:12px;padding:1rem 1.1rem;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.12);display:none;}
.ai-panel.open{display:block;}
.ai-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ai-hdr-txt{font-size:13px;font-weight:500;color:var(--txt0);}
.ai-close{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:15px;line-height:1;}
.ai-msgs{min-height:80px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.ai-msg{font-size:12px;padding:8px 10px;border-radius:8px;max-width:90%;line-height:1.45;}
.ai-msg.a{background:var(--stat);color:var(--txt0);align-self:flex-start;}
.ai-msg.u{background:var(--gold-dk);color:var(--gold);align-self:flex-end;}
.ai-row{display:flex;gap:6px;}
.ai-inp{flex:1;font-size:12px;border:0.5px solid var(--bdr2);border-radius:7px;padding:7px 10px;background:var(--bg2);color:var(--txt0);outline:none;font-family:inherit;}
.ai-send{background:var(--gold-dk);color:var(--gold);border:none;border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
<div class="navbar">
  <div class="nav-logo"><div class="logo-badge">PIH</div>Purdue Indy Hub</div>
  <div class="nav-links">
    <button class="nb" onclick="location.href='index.html'">Home</button>
    <button class="nb" onclick="location.href='map.html'">Map</button>
    <button class="nb" onclick="location.href='schedule.html'">Schedule</button>
    <button class="nb" onclick="location.href='events.html'">Events</button>
    <button class="nb active">More</button>
  </div>
  <div class="nav-r">
    <button class="tbtn" id="tbtn" onclick="toggleTheme()">☀</button>
    <div class="av">JS</div>
  </div>
</div>
<div class="main">
  <div class="page-hdr"><h1>Student Services</h1><p>Quick links to Purdue Indianapolis tools, portals, and resources.</p></div>

  <div class="quick-links">
    <div class="ql-card" onclick="location.href='schedule.html'">
      <div class="ql-icon">📅</div><div class="ql-label">My Schedule</div>
    </div>
    <div class="ql-card" onclick="location.href='dining.html'">
      <div class="ql-icon">🍽</div><div class="ql-label">Dining Menu</div>
    </div>
    <div class="ql-card" onclick="location.href='transit.html'">
      <div class="ql-icon">🚌</div><div class="ql-label">Bus Schedule</div>
    </div>
    <div class="ql-card" onclick="location.href='board.html'">
      <div class="ql-icon">💬</div><div class="ql-label">Campus Board</div>
    </div>
  </div>

  <div class="search-box">
    <span class="sicon">⌕</span>
    <input type="text" id="srch" placeholder="Search services..." oninput="render()">
  </div>
  <div id="sections"></div>
</div>

<!-- Campus Assistant — fixed -->
<div class="fab-wrap">
  <div class="ai-panel" id="ai-panel">
    <div class="ai-hdr">
      <span class="ai-hdr-txt">✦ Campus Assistant</span>
      <button class="ai-close" onclick="toggleAI()">✕</button>
    </div>
    <div class="ai-msgs" id="ai-msgs">
      <div class="ai-msg a">Ask me to find a service — financial aid, health center, tutoring, and more!</div>
    </div>
    <div class="ai-row">
      <input class="ai-inp" id="ai-inp" placeholder="Ask about campus..." onkeydown="if(event.key==='Enter')doAI()">
      <button class="ai-send" onclick="doAI()">↑</button>
    </div>
  </div>
  <button class="fab" onclick="toggleAI()" title="Campus Assistant">✦</button>
</div>
</div>

<script>
let dark=localStorage.getItem('pih-dark')==='1', aiOpen=false;
const SVCS=[
  {cat:'Academics',items:[
    {name:'Brightspace',desc:'Course content, assignments, and grades.',icon:'📚',color:'icon-blue',url:'https://purdue.brightspace.com'},
    {name:'BoilerClasses',desc:'Search and register for classes.',icon:'🔍',color:'icon-blue',url:'https://boilerclasses.com'},
    {name:'myPurdue',desc:'Student portal for records and advising.',icon:'🎓',color:'icon-blue',url:'https://mypurdue.purdue.edu'},
    {name:'Academic Success Center',desc:'Free tutoring and writing help.',icon:'✏️',color:'icon-green',url:'#asc'},
    {name:'University Library',desc:'Research tools, databases, and study rooms.',icon:'🏛️',color:'icon-blue',url:'#lib'},
    {name:'Degree Works',desc:'Track your degree progress and requirements.',icon:'📋',color:'icon-purple',url:'#'},
  ]},
  {cat:'Communication',items:[
    {name:'Purdue Email',desc:'@purdue.edu student email via Outlook.',icon:'✉️',color:'icon-blue',url:'https://outlook.com'},
    {name:'Microsoft Teams',desc:'Collaborate with classmates and faculty.',icon:'💬',color:'icon-purple',url:'https://teams.microsoft.com'},
    {name:'Slack Workspace',desc:'CS department and club channels.',icon:'#️⃣',color:'icon-purple',url:'#'},
  ]},
  {cat:'Finance & Housing',items:[
    {name:'Student Accounts',desc:'View and pay your tuition balance.',icon:'💳',color:'icon-amber',url:'#'},
    {name:'Financial Aid',desc:'Manage loans, grants, and scholarships.',icon:'💰',color:'icon-green',url:'#'},
    {name:'JagLine',desc:'IUPUI housing and residence life portal.',icon:'🏠',color:'icon-amber',url:'#'},
  ]},
  {cat:'Health & Wellness',items:[
    {name:'Student Health Center',desc:'On-campus health services and appointments.',icon:'🏥',color:'icon-pink',url:'#'},
    {name:'Counseling Center',desc:'Mental health resources and counseling.',icon:'🧠',color:'icon-pink',url:'#'},
    {name:'Campus Recreation',desc:'Gym access, classes, and intramural sports.',icon:'🏋️',color:'icon-green',url:'#'},
  ]},
  {cat:'Career & Professional',items:[
    {name:'Career Center',desc:'Resume help, job postings, and career fairs.',icon:'💼',color:'icon-blue',url:'#'},
    {name:'Handshake',desc:'Internship and job listings for students.',icon:'🤝',color:'icon-amber',url:'https://joinhandshake.com'},
    {name:'LinkedIn Learning',desc:'Free online courses with student account.',icon:'📈',color:'icon-blue',url:'https://linkedin.com/learning'},
  ]},
];
function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const filtered=SVCS.map(s=>({...s,items:s.items.filter(i=>!q||i.name.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q))})).filter(s=>s.items.length);
  document.getElementById('sections').innerHTML=filtered.map(s=>`
    <div class="section">
      <div class="section-title">${s.cat}</div>
      <div class="cards-grid">${s.items.map(i=>`
        <div class="svc-card" onclick="openLink('${i.url}')">
          <div class="svc-icon ${i.color}">${i.icon}</div>
          <div class="svc-body">
            <div class="svc-name">${i.name}</div>
            <div class="svc-desc">${i.desc}</div>
            <span class="svc-link">Open ↗</span>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}
function openLink(url){
  if(url==='#asc')location.href='map.html';
  else if(url==='#lib')location.href='map.html';
  else if(url&&url!=='#')window.open(url,'_blank');
}
function toggleTheme(){
  dark=!dark;
  document.getElementById('app').className=dark?'dark':'';
  document.getElementById('tbtn').textContent=dark?'☽':'☀';
  localStorage.setItem('pih-dark',dark?'1':'0');
}

// Campus Assistant
const aiR={
  'brightspace':'Brightspace is Purdue\'s LMS for course content, assignments, and grades. Access at purdue.brightspace.com.',
  'financial aid':'Visit Student Financial Services in the Campus Center or access your aid portal through myPurdue.',
  'tutor':'The Academic Success Center (ASC) at 620 Union Dr offers free tutoring for all subjects. Extended hours this week until 8 PM.',
  'health':'Student Health Center is on campus for medical appointments. Counseling Center is also available for mental health support.',
  'gym':'Campus Recreation offers gym access, group fitness classes, and intramural sports with your student ID.',
  'email':'Your Purdue email is @purdue.edu, accessed via Outlook at outlook.com.',
  'housing':'JagLine is the portal for IUPUI housing and residence life services.',
  'career':'The Career Center helps with resumes, job postings, and career fairs. Also check Handshake for internship listings.',
  'handshake':'Handshake (joinhandshake.com) is the go-to platform for internship and job listings tailored to Purdue students.',
  'print':'University Library gives you 25 free pages/day with your student ID.',
  'degree':'Degree Works lets you track your degree progress and see remaining requirements.',
  'schedule':'<a href="schedule.html" style="color:inherit;text-decoration:underline">View your class schedule →</a>',
  'map':'<a href="map.html" style="color:inherit;text-decoration:underline">Find campus buildings on the map →</a>',
  'board':'<a href="board.html" style="color:inherit;text-decoration:underline">Ask other students on the Campus Board →</a>',
};
function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('ai-panel').className='ai-panel'+(aiOpen?' open':'');
}
function doAI(){
  const inp=document.getElementById('ai-inp');
  const msgs=document.getElementById('ai-msgs');
  const t=inp.value.trim();if(!t)return;
  const um=document.createElement('div');um.className='ai-msg u';um.textContent=t;msgs.appendChild(um);
  inp.value='';
  setTimeout(()=>{
    const low=t.toLowerCase();
    let r='Ask me about any campus service — tutoring, financial aid, health, career, email, and more!';
    for(const k of Object.keys(aiR)){if(low.includes(k)){r=aiR[k];break;}}
    const bm=document.createElement('div');bm.className='ai-msg a';bm.innerHTML=r;msgs.appendChild(bm);
    msgs.scrollTop=msgs.scrollHeight;
  },500);
  msgs.scrollTop=msgs.scrollHeight;
}

if(dark){document.getElementById('app').className='dark';document.getElementById('tbtn').textContent='☽';}
render();
</script>
</body>
</html>

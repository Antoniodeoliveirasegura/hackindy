<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="browser-auth.js"></script>
<title>Schedule · Purdue Indy Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg0:#ffffff;--bg1:#f2f1ee;--bg2:#e8e7e3;
--txt0:#111110;--txt1:#52514d;--txt2:#8a897f;
--bdr:rgba(0,0,0,0.09);--bdr2:rgba(0,0,0,0.16);
--gold:#CFB991;--gold-dk:#3E2200;--stat:#eceae6;
}
.dark{
--bg0:#111113;--bg1:#18181a;--bg2:#222224;
--txt0:#f2f1ee;--txt1:#9a9890;--txt2:#5c5b55;
--bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.14);
--gold:#CFB991;--gold-dk:#4a2c00;--stat:#1e1e20;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg1);color:var(--txt0);}
.navbar{background:var(--bg0);border-bottom:0.5px solid var(--bdr);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.nav-logo{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--txt0);}
.logo-badge{background:var(--gold);color:var(--gold-dk);font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;}
.nav-links{display:flex;gap:2px;}
.nb{font-size:13px;color:var(--txt1);padding:5px 12px;border-radius:6px;cursor:pointer;border:none;background:none;font-family:inherit;}
.nb:hover,.nb.active{background:var(--bg2);color:var(--txt0);}.nb.active{font-weight:500;}
.nav-r{display:flex;align-items:center;gap:8px;}
.tbtn{width:32px;height:32px;border-radius:7px;border:0.5px solid var(--bdr2);background:var(--bg2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--txt0);}
.av{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold-dk);}
.main{max-width:1100px;margin:0 auto;padding:1.5rem 2rem 5rem;}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;}
.page-hdr h1{font-size:22px;font-weight:500;}
.page-hdr p{font-size:13px;color:var(--txt1);margin-top:3px;}
.week-label{font-size:13px;color:var(--txt1);background:var(--bg0);border:0.5px solid var(--bdr2);border-radius:7px;padding:6px 14px;}
.grid-wrap{background:var(--bg0);border:0.5px solid var(--bdr);border-radius:12px;overflow:hidden;}
.grid-header{display:grid;grid-template-columns:56px repeat(5,1fr);border-bottom:0.5px solid var(--bdr);}
.gh-cell{padding:10px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;border-right:0.5px solid var(--bdr);}
.gh-cell:last-child{border-right:none;}
.gh-cell.today{color:var(--gold-dk);background:#CFB99122;}
.dark .gh-cell.today{color:var(--gold);}
.grid-body{display:grid;grid-template-columns:56px repeat(5,1fr);position:relative;}
.time-col{display:flex;flex-direction:column;}
.time-slot{height:48px;border-bottom:0.5px solid var(--bdr);padding:6px 8px 0 0;text-align:right;font-size:10px;color:var(--txt2);}
.day-col{border-right:0.5px solid var(--bdr);position:relative;min-height:576px;}
.day-col:last-child{border-right:none;}
.hour-line{height:48px;border-bottom:0.5px solid var(--bdr);}
.class-block{position:absolute;left:4px;right:4px;border-radius:6px;padding:5px 7px;cursor:pointer;overflow:hidden;transition:opacity .15s;}
.class-block:hover{opacity:.85;}
.cb-code{font-size:9px;font-weight:500;opacity:.85;}
.cb-name{font-size:11px;font-weight:500;line-height:1.3;margin:1px 0;}
.cb-meta{font-size:9px;opacity:.75;}
.detail-panel{background:var(--bg0);border:0.5px solid var(--bdr);border-radius:12px;padding:1.25rem;margin-top:1.25rem;display:none;}
.detail-panel.open{display:block;}
.dp-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.dp-code{font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:3px;}
.dp-name{font-size:18px;font-weight:500;}
.dp-close{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:16px;}
.dp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.dp-stat{background:var(--stat);border-radius:7px;padding:9px 11px;}
.dp-sl{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.dp-sv{font-size:12px;font-weight:500;color:var(--txt0);}
.dp-acts{display:flex;gap:7px;}
.btn-p{background:var(--gold-dk);color:var(--gold);border:none;border-radius:7px;padding:8px 15px;font-size:12px;cursor:pointer;font-family:inherit;}
.btn-s{background:var(--bg2);color:var(--txt0);border:0.5px solid var(--bdr2);border-radius:7px;padding:8px 15px;font-size:12px;cursor:pointer;font-family:inherit;}
/* Campus Assistant — fixed */
.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.fab{width:46px;height:46px;border-radius:50%;background:var(--gold-dk);color:var(--gold);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.18);transition:background .15s;}
.fab:hover{background:#5c3a00;}.dark .fab:hover{background:#6a4400;}
.ai-panel{background:var(--bg0);border:0.5px solid var(--bdr2);border-radius:12px;padding:1rem 1.1rem;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.12);display:none;}
.ai-panel.open{display:block;}
.ai-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ai-hdr-txt{font-size:13px;font-weight:500;color:var(--txt0);}
.ai-close{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:15px;line-height:1;}
.ai-msgs{min-height:80px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.ai-msg{font-size:12px;padding:8px 10px;border-radius:8px;max-width:90%;line-height:1.45;}
.ai-msg.a{background:var(--stat);color:var(--txt0);align-self:flex-start;}
.ai-msg.u{background:var(--gold-dk);color:var(--gold);align-self:flex-end;}
.ai-row{display:flex;gap:6px;}
.ai-inp{flex:1;font-size:12px;border:0.5px solid var(--bdr2);border-radius:7px;padding:7px 10px;background:var(--bg2);color:var(--txt0);outline:none;font-family:inherit;}
.ai-send{background:var(--gold-dk);color:var(--gold);border:none;border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;}

/* Lucide icon sizing */
.nb svg,.nav-btn svg{width:13px;height:13px;stroke-width:2.5;flex-shrink:0;}
.nb,.nav-btn{display:flex;align-items:center;gap:5px;}
.tbtn svg,.theme-btn svg{width:15px;height:15px;stroke-width:2;}
.tbtn,.theme-btn{display:flex!important;align-items:center;justify-content:center;}
.fab svg{width:20px;height:20px;stroke-width:2;}
.ai-hdr-txt{display:flex;align-items:center;gap:5px;}
.ai-hdr-txt svg{width:13px;height:13px;stroke-width:2;}
.ai-close{display:flex;align-items:center;}
.ai-close svg{width:15px;height:15px;stroke-width:2;}
.ai-send{display:flex;align-items:center;}
.ai-send svg{width:14px;height:14px;stroke-width:2.5;}
.sbox svg,.search-box svg{width:13px;height:13px;stroke-width:2;color:var(--txt2);}
</style>
</head>
<body>
<div id="app">
<div class="navbar">
  <div class="nav-logo"><div class="logo-badge">PIH</div>Purdue Indy Hub</div>
  <div class="nav-links">
    <button class="nb" onclick="location.href='index.html'"><i data-lucide="home"></i>Home</button>
    <button class="nb" onclick="location.href='map.html'"><i data-lucide="map"></i>Map</button>
    <button class="nb active"><i data-lucide="calendar"></i>Schedule</button>
    <button class="nb" onclick="location.href='events.html'"><i data-lucide="calendar-days"></i>Events</button>
    <button class="nb" onclick="location.href='services.html'"><i data-lucide="grid-2x2"></i>More</button>
  </div>
  <div class="nav-r">
    <button class="tbtn" id="tbtn" onclick="toggleTheme()"><i data-lucide="sun"></i></button>
    <div class="av">JS</div>
  </div>
</div>
<div class="main">
  <div class="page-hdr">
    <div><h1>My Schedule</h1><p>Spring 2026 · Weekly class grid</p></div>
    <div class="week-label">Mar 23 – 27, 2026</div>
  </div>
  <div class="grid-wrap">
    <div class="grid-header">
      <div class="gh-cell"></div>
      <div class="gh-cell">Mon</div>
      <div class="gh-cell">Tue</div>
      <div class="gh-cell">Wed</div>
      <div class="gh-cell">Thu</div>
      <div class="gh-cell today">Fri</div>
    </div>
    <div class="grid-body" id="grid-body"></div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="dp-hdr">
      <div><div class="dp-code" id="dp-code"></div><div class="dp-name" id="dp-name"></div></div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dp-grid">
      <div class="dp-stat"><div class="dp-sl">Building</div><div class="dp-sv" id="dp-bldg"></div></div>
      <div class="dp-stat"><div class="dp-sl">Room</div><div class="dp-sv" id="dp-room"></div></div>
      <div class="dp-stat"><div class="dp-sl">Days</div><div class="dp-sv" id="dp-days"></div></div>
      <div class="dp-stat"><div class="dp-sl">Professor</div><div class="dp-sv" id="dp-prof"></div></div>
    </div>
    <div class="dp-acts">
      <button class="btn-p" onclick="location.href='map.html'">Find on map ↗</button>
      <button class="btn-s" onclick="location.href='dining.html'">Dining nearby ↗</button>
    </div>
  </div>
</div>

<!-- Campus Assistant — fixed -->
<div class="fab-wrap">
  <div class="ai-panel" id="ai-panel">
    <div class="ai-hdr">
      <span class="ai-hdr-txt"><i data-lucide="sparkles"></i>Campus Assistant</span>
      <button class="ai-close" onclick="toggleAI()"><i data-lucide="x"></i></button>
    </div>
    <div class="ai-msgs" id="ai-msgs">
      <div class="ai-msg a">Ask me about your classes, professors, or building locations!</div>
    </div>
    <div class="ai-row">
      <input class="ai-inp" id="ai-inp" placeholder="Ask about campus..." onkeydown="if(event.key==='Enter')doAI()">
      <button class="ai-send" onclick="doAI()"><i data-lucide="arrow-up"></i></button>
    </div>
  </div>
  <button class="fab" onclick="toggleAI()" title="Campus Assistant"><i data-lucide="bot"></i></button>
</div>
</div>

<script>
let dark=localStorage.getItem('pih-dark')==='1', aiOpen=false;
const HOURS=['8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM','7 PM'];
const START_H=8;
const DAYS=['mon','tue','wed','thu','fri'];
const CLASSES=[
  {id:1,code:'CS 18000',name:'Problem Solving & OOP',bldg:'ET',room:'ET 108',days:['mon','wed','fri'],start:'9:00',end:'9:50',prof:'Dr. Hamid',color:'#2062a4',colorDark:'#1a4e8c'},
  {id:2,code:'MATH 26100',name:'Multivariate Calculus',bldg:'SL',room:'SL 220',days:['mon','wed','fri'],start:'11:00',end:'11:50',prof:'Dr. Patel',color:'#3d7e18',colorDark:'#2a5e10'},
  {id:3,code:'CS 30200',name:'Software Engineering',bldg:'ET',room:'ET 215',days:['tue','thu'],start:'13:30',end:'14:45',prof:'Prof. Nguyen',color:'#a06010',colorDark:'#7a4800'},
  {id:4,code:'ECE 20200',name:'Linear Circuit Analysis',bldg:'ET',room:'ET 324',days:['mon','wed'],start:'14:00',end:'15:15',prof:'Dr. Kim',color:'#5040b0',colorDark:'#3a2e8c'},
  {id:5,code:'COM 11400',name:'Fundamentals of Speech',bldg:'CAV',room:'CAV 110',days:['tue','thu'],start:'10:30',end:'11:20',prof:'Prof. Allen',color:'#a33060',colorDark:'#7a2048'},
];
function timeToY(t){const[h,m]=t.split(':').map(Number);return((h-START_H)*60+m)/60*48;}
function buildGrid(){
  const gb=document.getElementById('grid-body');
  let html=`<div class="time-col">${HOURS.map(h=>`<div class="time-slot">${h}</div>`).join('')}</div>`;
  DAYS.forEach(day=>{
    const cls=CLASSES.filter(c=>c.days.includes(day));
    html+=`<div class="day-col">${HOURS.map(()=>`<div class="hour-line"></div>`).join('')}`;
    cls.forEach(c=>{
      const top=timeToY(c.start);
      const[sh,sm]=c.start.split(':').map(Number);
      const[eh,em]=c.end.split(':').map(Number);
      const h=((eh*60+em)-(sh*60+sm))/60*48;
      const bg=dark?c.colorDark:c.color;
      html+=`<div class="class-block" style="top:${top}px;height:${h}px;background:${bg}20;border-left:3px solid ${bg}" onclick="showDetail(${c.id})">
        <div class="cb-code" style="color:${bg}">${c.code}</div>
        <div class="cb-name" style="color:${bg}">${c.name}</div>
        <div class="cb-meta" style="color:${bg}">${c.room}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  gb.innerHTML=html;
}
function showDetail(id){
  const c=CLASSES.find(x=>x.id===id);if(!c)return;
  document.getElementById('dp-code').textContent=c.code;
  document.getElementById('dp-name').textContent=c.name;
  document.getElementById('dp-bldg').textContent=c.bldg+' Building';
  document.getElementById('dp-room').textContent=c.room;
  document.getElementById('dp-days').textContent=c.days.map(d=>d.charAt(0).toUpperCase()+d.slice(1)).join(', ');
  document.getElementById('dp-prof').textContent=c.prof;
  document.getElementById('detail-panel').className='detail-panel open';
}
function closeDetail(){document.getElementById('detail-panel').className='detail-panel';}
function toggleTheme(){
  dark=!dark;
  document.getElementById('app').className=dark?'dark':'';
  document.getElementById('tbtn').innerHTML=dark?'<i data-lucide="moon"></i>':'<i data-lucide="sun"></i>';lucide.createIcons();
  localStorage.setItem('pih-dark',dark?'1':'0');
  buildGrid();
}

// Campus Assistant
const aiR={
  'cs 18000':'CS 18000 – Problem Solving & OOP with Dr. Hamid. Mon/Wed/Fri 9:00–9:50 AM in ET 108.',
  'cs 30200':'CS 30200 – Software Engineering with Prof. Nguyen. Tue/Thu 1:30–2:45 PM in ET 215.',
  'math 26100':'MATH 26100 – Multivariate Calculus with Dr. Patel. Mon/Wed/Fri 11:00–11:50 AM in SL 220.',
  'ece 20200':'ECE 20200 – Linear Circuit Analysis with Dr. Kim. Mon/Wed 2:00–3:15 PM in ET 324.',
  'com 11400':'COM 11400 – Fundamentals of Speech with Prof. Allen. Tue/Thu 10:30–11:20 AM in CAV 110.',
  'next class':'Your next class today is CS 30200 – Software Engineering at 1:30 PM in ET 215.',
  'free':'You have 1h 22m free before Software Engineering at 1:30 PM.',
  'today':'Today (Friday) you have CS 18000 at 9 AM and CS 30200 would normally be Tue/Thu — enjoy a lighter Friday!',
  'credits':'You are enrolled in 5 courses this semester: CS 18000, MATH 26100, CS 30200, ECE 20200, COM 11400.',
  'map':'<a href="map.html" style="color:inherit;text-decoration:underline">Find your buildings on the map →</a>',
  'dining':'<a href="dining.html" style="color:inherit;text-decoration:underline">See today\'s dining menu →</a>',
  'nguyen':'Prof. Nguyen teaches CS 30200 – Software Engineering. Class is Tue/Thu 1:30–2:45 PM in ET 215.',
  'hamid':'Dr. Hamid teaches CS 18000 – Problem Solving & OOP. Class is Mon/Wed/Fri 9–9:50 AM in ET 108.',
  'patel':'Dr. Patel teaches MATH 26100 – Multivariate Calculus. Mon/Wed/Fri 11–11:50 AM in SL 220.',
};
function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('ai-panel').className='ai-panel'+(aiOpen?' open':'');
}
function doAI(){
  const inp=document.getElementById('ai-inp');
  const msgs=document.getElementById('ai-msgs');
  const t=inp.value.trim();if(!t)return;
  const um=document.createElement('div');um.className='ai-msg u';um.textContent=t;msgs.appendChild(um);
  inp.value='';
  setTimeout(()=>{
    const low=t.toLowerCase();
    let r='Ask me about a specific class (e.g. "CS 30200"), your next class, or your free time today!';
    for(const k of Object.keys(aiR)){if(low.includes(k)){r=aiR[k];break;}}
    const bm=document.createElement('div');bm.className='ai-msg a';bm.innerHTML=r;msgs.appendChild(bm);
    msgs.scrollTop=msgs.scrollHeight;
  },500);
  msgs.scrollTop=msgs.scrollHeight;
}

if(dark){document.getElementById('app').className='dark';document.getElementById('tbtn').innerHTML='<i data-lucide="moon"></i>';}
buildGrid();
window.PIHAuth.requireAuth().catch(console.error);
</script>
</body>
</html>
